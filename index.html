<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Title</title>
    <script src="https://code.jquery.com/jquery-4.0.0.js"
            integrity="sha256-9fsHeVnKBvqh3FB2HYu7g2xseAZ5MlN6Kz/qnkASV8U="
            crossorigin="anonymous">
    </script>
    <script>
        $(document).ready(function() {
          $.ajax({
            url: "http://api.openweathermap.org/data/2.5/weather?q=Auckland&appid=14722d4b491bd03fcffbec034104272a",
            type: "GET",
            dataType: "json",
            success: function (response) {
                console.log("Success: ", response);
                $("#clouds").text(response.clouds.all);
                $("#temp").text(response.main.temp);
                $("#humidity").text(response.main.humidity);
            },
            error: function (xhr, status, error) {
                console.log("Error: ", error);
            }
          })
        })
    </script>
</head>
<body>
<h2>Auckland</h2>
<p>Clouds: <span id="clouds"></span></p>
<p>Temperature: <span id="temp"></span></p>
<p>Humidity: <span id="humidity"></span></p>
</body>
</html>
